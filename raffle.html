<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>抽奖系统</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    :root {
      --feishu-blue: #3370FF;
      --feishu-blue-hover: #2b5fd9;
      --feishu-bg: #F5F6F7;
      --feishu-border: #DEE0E3;
      --feishu-text-main: #1F2329;
      --feishu-text-secondary: #646A73;
      --feishu-green: #34C724;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
    }
    
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .animate-fade-in {
      animation: fade-in 0.3s ease-out forwards;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    const TrophyIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ color: 'var(--feishu-blue)' }}>
        <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/>
        <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/>
        <path d="M4 22h16"/>
        <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/>
        <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/>
        <path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/>
      </svg>
    );

    const UsersIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ color: 'var(--feishu-text-secondary)' }}>
        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
    );

    const DownloadIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" x2="12" y1="15" y2="3"/>
      </svg>
    );

    const TrashIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M3 6h18"/>
        <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/>
        <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
      </svg>
    );

    const PlayIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <polygon points="6 3 20 12 6 21 6 3"/>
      </svg>
    );

    const SquareIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <rect width="14" height="14" x="5" y="5" rx="2"/>
      </svg>
    );

    const ChevronDownIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ color: 'var(--feishu-text-secondary)' }}>
        <path d="m6 9 6 6 6-6"/>
      </svg>
    );

    function App() {
      const [activities] = useState([
        { id: '1', name: '2026 年会特等奖' },
        { id: '2', name: '2026 年会一等奖' },
        { id: '3', name: '2026 年会二等奖' },
        { id: '4', name: '阳光普照奖' },
      ]);
      const [currentActivityId, setCurrentActivityId] = useState('1');
      const [participantsText, setParticipantsText] = useState('张三\n李四\n王五\n赵六\n钱七\n孙八\n周九\n吴十\n郑十一\n王十二');
      const [winners, setWinners] = useState([]);
      const [isDrawing, setIsDrawing] = useState(false);
      const [currentDisplay, setCurrentDisplay] = useState('');
      
      const drawIntervalRef = useRef(null);

      const participantsList = useMemo(() => {
        return participantsText.split('\n').map(s => s.trim()).filter(Boolean);
      }, [participantsText]);

      const currentActivityWinners = useMemo(() => {
        return winners.filter(w => w.activityId === currentActivityId).reverse();
      }, [winners, currentActivityId]);

      const handleStart = () => {
        if (participantsList.length === 0) return;
        setIsDrawing(true);
        
        if (participantsList.length === 1) {
          setCurrentDisplay(participantsList[0]);
        }

        drawIntervalRef.current = setInterval(() => {
          setCurrentDisplay(prev => {
            if (participantsList.length <= 1) return participantsList[0] || '';
            let nextName;
            do {
              const randomIndex = Math.floor(Math.random() * participantsList.length);
              nextName = participantsList[randomIndex];
            } while (nextName === prev);
            return nextName;
          });
        }, 50);
      };

      const handleStop = () => {
        if (!isDrawing) return;
        setIsDrawing(false);
        if (drawIntervalRef.current !== null) {
          clearInterval(drawIntervalRef.current);
          drawIntervalRef.current = null;
        }

        const finalName = currentDisplay;
        if (finalName) {
          const newWinner = {
            id: Math.random().toString(36).substring(2, 9),
            activityId: currentActivityId,
            name: finalName,
            time: new Date().toLocaleTimeString('zh-CN', { hour12: false })
          };
          setWinners(prev => [...prev, newWinner]);
          
          setParticipantsText(prevText => {
            const list = prevText.split('\n').map(s => s.trim()).filter(Boolean);
            const newList = list.filter(name => name !== finalName);
            return newList.join('\n');
          });
        }
      };

      const exportWinners = () => {
        if (currentActivityWinners.length === 0) return;
        const csvContent = "data:text/csv;charset=utf-8,\uFEFF" 
          + "序号,姓名,时间\n"
          + currentActivityWinners.map((w, i) => `${currentActivityWinners.length - i},${w.name},${w.time}`).join('\n');
        
        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        const actName = activities.find(a => a.id === currentActivityId)?.name || '抽奖';
        link.setAttribute("download", `${actName}_中奖名单.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      const clearWinners = () => {
        if (window.confirm('确定要清空当前活动的中奖记录吗？')) {
          setWinners(prev => prev.filter(w => w.activityId !== currentActivityId));
        }
      };

      useEffect(() => {
        return () => {
          if (drawIntervalRef.current !== null) {
            clearInterval(drawIntervalRef.current);
          }
        };
      }, []);

      const styles = {
        container: {
          height: '100vh',
          width: '100%',
          display: 'flex',
          backgroundColor: 'var(--feishu-bg)',
          color: 'var(--feishu-text-main)',
          overflow: 'hidden'
        },
        sidebar: {
          width: '320px',
          backgroundColor: 'white',
          borderRight: '1px solid var(--feishu-border)',
          display: 'flex',
          flexDirection: 'column',
          height: '100%',
          boxShadow: '1px 0 4px rgba(0,0,0,0.02)',
          zIndex: 10
        },
        sidebarHeader: {
          padding: '20px',
          borderBottom: '1px solid var(--feishu-border)',
          display: 'flex',
          alignItems: 'center',
          gap: '8px',
          fontSize: '18px',
          fontWeight: 600
        },
        sidebarContent: {
          padding: '20px',
          flex: 1,
          overflowY: 'auto',
          display: 'flex',
          flexDirection: 'column',
          gap: '24px'
        },
        label: {
          fontSize: '14px',
          fontWeight: 500,
          color: 'var(--feishu-text-main)',
          marginBottom: '8px',
          display: 'flex',
          alignItems: 'center',
          gap: '6px'
        },
        select: {
          width: '100%',
          appearance: 'none',
          backgroundColor: 'white',
          border: '1px solid var(--feishu-border)',
          borderRadius: '6px',
          padding: '8px 12px',
          fontSize: '14px',
          color: 'var(--feishu-text-main)',
          cursor: 'pointer',
          outline: 'none'
        },
        selectWrapper: {
          position: 'relative'
        },
        selectIcon: {
          position: 'absolute',
          right: '12px',
          top: '50%',
          transform: 'translateY(-50%)',
          pointerEvents: 'none'
        },
        textarea: {
          width: '100%',
          minHeight: '200px',
          flex: 1,
          resize: 'none',
          border: '1px solid var(--feishu-border)',
          borderRadius: '6px',
          padding: '12px',
          fontSize: '14px',
          color: 'var(--feishu-text-main)',
          outline: 'none',
          lineHeight: 1.6
        },
        badge: {
          fontSize: '12px',
          color: 'var(--feishu-text-secondary)',
          backgroundColor: 'var(--feishu-bg)',
          padding: '2px 8px',
          borderRadius: '999px',
          border: '1px solid var(--feishu-border)'
        },
        centerArea: {
          flex: 1,
          display: 'flex',
          flexDirection: 'column',
          alignItems: 'center',
          justifyContent: 'center',
          position: 'relative'
        },
        drawBox: {
          width: '640px',
          height: '400px',
          backgroundColor: 'white',
          borderRadius: '16px',
          border: '1px solid var(--feishu-border)',
          boxShadow: '0 4px 24px rgba(0,0,0,0.04)',
          display: 'flex',
          flexDirection: 'column',
          alignItems: 'center',
          justifyContent: 'center',
          position: 'relative',
          overflow: 'hidden'
        },
        displayName: {
          fontSize: '64px',
          fontWeight: 'bold',
          color: 'var(--feishu-text-main)',
          letterSpacing: '4px',
          userSelect: 'none'
        },
        congratsBadge: {
          position: 'absolute',
          top: '40px',
          color: 'var(--feishu-green)',
          fontWeight: 500,
          fontSize: '18px',
          display: 'flex',
          alignItems: 'center',
          gap: '8px',
          backgroundColor: '#f0fdf4',
          padding: '6px 16px',
          borderRadius: '999px',
          border: '1px solid #bbf7d0'
        },
        button: {
          display: 'flex',
          alignItems: 'center',
          gap: '8px',
          padding: '16px 40px',
          borderRadius: '6px',
          fontSize: '18px',
          fontWeight: 500,
          border: 'none',
          cursor: 'pointer',
          transition: 'all 0.2s'
        },
        buttonBlue: {
          backgroundColor: 'var(--feishu-blue)',
          color: 'white',
          boxShadow: '0 4px 12px rgba(51,112,255,0.2)'
        },
        buttonRed: {
          backgroundColor: '#ef4444',
          color: 'white',
          boxShadow: '0 4px 12px rgba(239,68,68,0.2)'
        },
        buttonDisabled: {
          opacity: 0.5,
          cursor: 'not-allowed',
          boxShadow: 'none'
        },
        rightSidebar: {
          width: '320px',
          backgroundColor: 'white',
          borderLeft: '1px solid var(--feishu-border)',
          display: 'flex',
          flexDirection: 'column',
          height: '100%',
          boxShadow: '-1px 0 4px rgba(0,0,0,0.02)',
          zIndex: 10
        },
        rightSidebarHeader: {
          padding: '20px',
          borderBottom: '1px solid var(--feishu-border)',
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'space-between'
        },
        rightSidebarTitle: {
          fontSize: '16px',
          fontWeight: 600
        },
        iconButton: {
          padding: '6px',
          color: 'var(--feishu-text-secondary)',
          background: 'none',
          border: 'none',
          borderRadius: '6px',
          cursor: 'pointer',
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'center',
          transition: 'all 0.2s'
        },
        winnersList: {
          flex: 1,
          overflowY: 'auto',
          padding: '16px'
        },
        winnerItem: {
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'space-between',
          padding: '12px',
          backgroundColor: 'var(--feishu-bg)',
          borderRadius: '6px',
          marginBottom: '8px'
        },
        winnerIndex: {
          fontSize: '12px',
          fontWeight: 500,
          color: 'var(--feishu-text-secondary)',
          width: '20px',
          textAlign: 'center',
          backgroundColor: 'white',
          borderRadius: '2px',
          padding: '2px 0',
          border: '1px solid var(--feishu-border)'
        },
        winnerName: {
          fontSize: '14px',
          fontWeight: 500,
          color: 'var(--feishu-text-main)'
        },
        winnerTime: {
          fontSize: '12px',
          color: 'var(--feishu-text-secondary)',
          fontFamily: 'monospace'
        },
        emptyState: {
          height: '100%',
          display: 'flex',
          flexDirection: 'column',
          alignItems: 'center',
          justifyContent: 'center',
          color: 'var(--feishu-text-secondary)',
          fontSize: '14px'
        }
      };

      const isLastWinner = currentDisplay && !isDrawing && winners.length > 0 && winners[winners.length - 1].name === currentDisplay;

      return (
        <div style={styles.container}>
          <div style={styles.sidebar}>
            <div style={styles.sidebarHeader}>
              <TrophyIcon />
              抽奖系统
            </div>
            
            <div style={styles.sidebarContent}>
              <div>
                <div style={styles.label}>活动选择</div>
                <div style={styles.selectWrapper}>
                  <select 
                    style={styles.select}
                    value={currentActivityId}
                    onChange={(e) => setCurrentActivityId(e.target.value)}
                    disabled={isDrawing}
                  >
                    {activities.map(act => (
                      <option key={act.id} value={act.id}>{act.name}</option>
                    ))}
                  </select>
                  <div style={styles.selectIcon}>
                    <ChevronDownIcon />
                  </div>
                </div>
              </div>

              <div style={{ flex: 1, display: 'flex', flexDirection: 'column' }}>
                <div style={{ ...styles.label, justifyContent: 'space-between', marginBottom: '8px' }}>
                  <span style={{ display: 'flex', alignItems: 'center', gap: '6px' }}>
                    <UsersIcon />
                    参与名单
                  </span>
                  <span style={styles.badge}>共 {participantsList.length} 人</span>
                </div>
                <textarea 
                  style={styles.textarea}
                  placeholder="请输入参与者名单，每行一个名字..."
                  value={participantsText}
                  onChange={(e) => setParticipantsText(e.target.value)}
                  disabled={isDrawing}
                />
              </div>
            </div>
          </div>

          <div style={styles.centerArea}>
            <div style={styles.drawBox}>
              <div style={styles.displayName}>
                {currentDisplay || "等待抽奖"}
              </div>
              
              {isLastWinner && (
                <div style={{ ...styles.congratsBadge, className: 'animate-fade-in' }}>
                  🎉 恭喜中奖 🎉
                </div>
              )}
            </div>

            <div style={{ marginTop: '48px' }}>
              <button 
                style={{
                  ...styles.button,
                  ...(isDrawing ? styles.buttonRed : styles.buttonBlue),
                  ...(participantsList.length === 0 ? styles.buttonDisabled : {})
                }}
                onClick={isDrawing ? handleStop : handleStart}
                disabled={participantsList.length === 0}
              >
                {isDrawing ? (
                  <>
                    <SquareIcon />
                    停止滚动
                  </>
                ) : (
                  <>
                    <PlayIcon />
                    开始抽奖
                  </>
                )}
              </button>
            </div>
          </div>

          <div style={styles.rightSidebar}>
            <div style={styles.rightSidebarHeader}>
              <div style={styles.rightSidebarTitle}>中奖记录</div>
              <div style={{ display: 'flex', gap: '6px' }}>
                <button 
                  onClick={exportWinners}
                  style={styles.iconButton}
                  title="导出名单"
                  onMouseEnter={(e) => e.target.style.color = 'var(--feishu-blue)'}
                  onMouseLeave={(e) => e.target.style.color = 'var(--feishu-text-secondary)'}
                >
                  <DownloadIcon />
                </button>
                <button 
                  onClick={clearWinners}
                  style={styles.iconButton}
                  title="清空记录"
                  onMouseEnter={(e) => e.target.style.color = '#ef4444'}
                  onMouseLeave={(e) => e.target.style.color = 'var(--feishu-text-secondary)'}
                >
                  <TrashIcon />
                </button>
              </div>
            </div>
            
            <div style={styles.winnersList}>
              {currentActivityWinners.length === 0 ? (
                <div style={styles.emptyState}>
                  暂无中奖记录
                </div>
              ) : (
                currentActivityWinners.map((winner, idx) => (
                  <div key={winner.id} style={{ ...styles.winnerItem, className: 'animate-fade-in' }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
                      <span style={styles.winnerIndex}>
                        {currentActivityWinners.length - idx}
                      </span>
                      <span style={styles.winnerName}>
                        {winner.name}
                      </span>
                    </div>
                    <span style={styles.winnerTime}>
                      {winner.time}
                    </span>
                  </div>
                ))
              )}
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
